services:
  db:
    image: mysql:8.0
    container_name: mysql-restaurant
    platform: linux/amd64
    restart: always
    environment:
      TZ: America/Sao_Paulo
      MYSQL_DATABASE: db_restaurant
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "root", "-proot" ]
      timeout: 5s
      retries: 10
  app:
    build: .
    container_name: restaurant-api
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - JAVA_TOOL_OPTIONS=-Duser.timezone=America/Sao_Paulo
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/db_restaurant?createDatabaseIfNotExist=true&serverTimezone=America/Sao_Paulo
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root

volumes:
  mysql_data: